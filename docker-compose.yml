services:
  # ── Frontend (Next.js) ──
  frontend:
    build:
      context: ../fluxocaixa-front
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080
    container_name: fluxocaixa-front
    ports:
      - "3000:3000"
    environment:
      NEXTAUTH_URL: http://localhost:3000
      NEXTAUTH_SECRET: fluxocaixa-nextauth-secret-key-change-in-production
      AUTH_TRUST_HOST: "true"
      KEYCLOAK_ISSUER: http://localhost:8180/realms/fluxocaixa
      KEYCLOAK_ISSUER_INTERNAL: http://keycloak:8080/realms/fluxocaixa
      KEYCLOAK_CLIENT_ID: fluxocaixa-api
      KEYCLOAK_CLIENT_SECRET: fluxocaixa-secret
      NEXT_PUBLIC_API_URL: http://localhost:8080
      API_URL_INTERNAL: http://app:8080
    depends_on:
      - app
      - keycloak
    restart: unless-stopped

  # ── Aplicação ──
  app:
    build: .
    container_name: fluxocaixa-app
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:h2:file:/data/fluxocaixa
      SPRING_H2_CONSOLE_SETTINGS_WEB_ALLOW_OTHERS: "true"
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://localhost:8180/realms/fluxocaixa
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/fluxocaixa/protocol/openid-connect/certs
    volumes:
      - h2-data:/data
    depends_on:
      keycloak:
        condition: service_started
    restart: unless-stopped

  # ── Keycloak ──
  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    container_name: fluxocaixa-keycloak
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
      - keycloak-data:/opt/keycloak/data
    command:
      - start-dev
      - --import-realm
      - --hostname=http://localhost:8180
      - --hostname-backchannel-dynamic=true
    restart: unless-stopped

volumes:
  h2-data:
    driver: local
  keycloak-data:
    driver: local
